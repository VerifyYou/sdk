<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acme Co. | VerifyYou SDK demo</title>
    <style>
      :root {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: #111;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(160deg, #f5f7fb, #e9edf6);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        width: min(480px, 92vw);
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
        padding: 32px;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 22px;
      }
      .muted {
        color: #667;
        font-size: 14px;
        margin: 0 0 24px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        margin: 16px 0 6px;
      }
      input[type="text"],
      input[type="email"] {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border: 1px solid #ccd;
        border-radius: 8px;
        font-size: 14px;
      }
      .row {
        display: flex;
        gap: 16px;
        align-items: center;
        margin-top: 14px;
        font-size: 14px;
      }
      .row label {
        margin: 0;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      button.cta {
        margin-top: 24px;
        width: 100%;
        padding: 13px;
        border: 0;
        border-radius: 999px;
        background: #2b59ff;
        color: #fff;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }
      button.cta:hover {
        background: #1d47e0;
      }
      pre {
        margin-top: 20px;
        background: #0e1117;
        color: #c8e1ff;
        border-radius: 10px;
        padding: 14px;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
        min-height: 20px;
      }
      #inline-host {
        margin-top: 20px;
        /* Inline mode fills this container — the integrator just sizes it. */
        height: 600px;
        border-radius: 12px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Acme Co.</h1>
      <p class="muted">Demo host page · embeds VerifyYou in an iframe (no redirect)</p>

      <label for="publishableKey">Publishable key</label>
      <input
        id="publishableKey"
        type="text"
        placeholder="pk_test_…"
        value="pk_test_W0UG4HCyBgaGmAaTxESlN1l9nfTpms7jwbfZufgH0Ma"
      />

      <label for="email">Email (optional prefill)</label>
      <input id="email" type="email" placeholder="you@example.com" />

      <div class="row">
        <label><input type="radio" name="flow" value="redirect" checked /> Redirect</label>
        <label><input type="radio" name="flow" value="iframe" /> Iframe</label>
      </div>
      <div class="row">
        <label><input type="radio" name="display" value="drawer" checked /> Drawer</label>
        <label><input type="radio" name="display" value="inline" /> Inline</label>
        <span style="color: #889; font-size: 12px">(iframe only)</span>
      </div>

      <button class="cta" id="verifyBtn">Verify with VerifyYou</button>

      <div id="inline-host"></div>
      <pre id="out">result will appear here…</pre>
    </div>

    <script type="module" src="/main.ts"></script>
  </body>
</html>
