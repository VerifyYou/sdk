# Supply-chain hardening for pnpm 10.x (mirrors app-fe). Read ONLY from this
# file in pnpm 10, not .npmrc.

# Refuse to resolve versions published less than this many minutes ago (3 days)
# — malicious publishes are usually caught + unpublished within that window.
# Need a same-day version? Add it to minimumReleaseAgeExclude.
minimumReleaseAge: 4320
minimumReleaseAgeExclude: []

# pnpm 10 blocks every dependency build script by default; this allowlist is the
# only place one is permitted. Keep it empty unless a build genuinely needs one.
onlyBuiltDependencies: []

# Warn if node_modules drifted from the lockfile before running any script.
verifyDepsBeforeRun: warn
